name: "Reconcile — Integrity Check"

on:
  schedule:
    - cron: "30 3 * * *"  # Daily at 3:30 AM UTC
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

concurrency:
  group: pipeline-data
  cancel-in-progress: false

jobs:
  reconcile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run reconciliation check
        id: reconcile
        run: |
          python tools/reconcile.py > _reconcile_report.json 2>&1 || true
          STATUS=$(python -c "import json; r=json.load(open('_reconcile_report.json')); print(r['status'])")
          COUNT=$(python -c "import json; r=json.load(open('_reconcile_report.json')); print(r['issue_count'])")
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

          # Auto-fix: stale_certificates and stale_site are safe to repair in-place
          # Single Python call reads the report once and outputs both flags space-separated
          read -r STALE_CERTS STALE_SITE < <(python -c "
import json
r = json.load(open('_reconcile_report.json'))
types = {i['type'] for i in r.get('issues', [])}
certs = 'true' if 'stale_certificates' in types else 'false'
site  = 'true' if 'stale_site'         in types else 'false'
print(certs, site)
          ")
          FIXED=false
          if [ "$STALE_CERTS" = "true" ]; then
            echo "Auto-fixing stale certificates..."
            python tools/export_equation_certificates.py
            FIXED=true
          fi
          if [ "$STALE_SITE" = "true" ] || [ "$STALE_CERTS" = "true" ]; then
            echo "Auto-fixing stale site..."
            python tools/generate_leaderboard.py
            python tools/build_site.py
            FIXED=true
          fi
          echo "auto_fixed=$FIXED" >> "$GITHUB_OUTPUT"

      - name: Commit auto-fixes
        if: steps.reconcile.outputs.auto_fixed == 'true'
        run: |
          git config user.name "TopEquations Bot"
          git config user.email "bot@topequations.local"
          git add -A
          git diff --cached --quiet && echo "Nothing to commit" || git commit -m "Reconcile: auto-fix stale certs/site"
          git push

      - name: Open integrity alert issue if drift detected
        if: steps.reconcile.outputs.status == 'DRIFT'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('_reconcile_report.json', 'utf8'));

            let body = `## Integrity Drift Detected\n\n`;
            body += `**Status:** ${report.status}\n`;
            body += `**Issues found:** ${report.issue_count}\n\n`;

            for (const issue of report.issues) {
              body += `### ${issue.type} (${issue.severity})\n`;
              body += `${issue.message}\n`;
              if (issue.ids) {
                body += `\`\`\`\n${issue.ids.join('\n')}\n\`\`\`\n`;
              }
              body += `\n`;
            }

            body += `---\n*Generated by the daily reconciliation workflow.*`;

            // Check if there's already an open integrity-alert issue
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'integrity-alert',
              state: 'open',
            });

            if (existing.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[Integrity] Drift detected — ${report.issue_count} issues`,
                body: body,
                labels: ['integrity-alert'],
              });
            } else {
              // Update existing issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: body,
              });
            }
