name: "Process Equation Submission"

on:
  issues:
    types: [opened, edited, labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to (re-)process"
        required: true
        type: number

permissions:
  contents: write
  issues: write

concurrency:
  group: pipeline-data
  cancel-in-progress: false

jobs:
  process-submission:
    if: >-
      (github.event_name == 'workflow_dispatch') ||
      (contains(github.event.issue.labels.*.name, 'submission')
      && !contains(github.event.issue.labels.*.name, 'processed')
      && !contains(github.event.issue.labels.*.name, 'invalid'))
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install solver dependencies
        run: |
          pip install numpy scipy
          pip install git+https://github.com/RDM3DC/History-Resolved-Phase-as-a-State-Variable-in-Adaptive-Complex-Networks.git || echo "hrphasenet install skipped (solver checks will be skipped)"

      - name: Extract submission JSON from issue body
        id: extract
        uses: actions/github-script@v7
        with:
          script: |
            // Resolve the issue number from event payload or workflow_dispatch input
            const issueNumber = context.eventName === 'workflow_dispatch'
              ? parseInt(context.payload.inputs.issue_number, 10)
              : context.payload.issue.number;

            let issueBody = '';
            let issueAuthor = '';
            if (context.eventName === 'workflow_dispatch') {
              const { data: issue } = await github.rest.issues.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
              });
              issueBody = issue.body || '';
              issueAuthor = issue.user.login;
            } else {
              issueBody = context.payload.issue.body || '';
              issueAuthor = context.payload.issue.user.login;
            }

            const body = issueBody;
            // Find the JSON block within the "Submission JSON" textarea
            // The issue template wraps it in a section with id submission_json
            // GitHub renders it as: ### Submission JSON\n\n<content>
            let jsonText = body;

            // Try to extract from between the Submission JSON header and the next header/checkbox
            const sectionMatch = body.match(/### Submission JSON\s*\n+([\s\S]*?)(?=\n### |\n- \[|$)/);
            if (sectionMatch) {
              jsonText = sectionMatch[1].trim();
            }

            // Strip markdown code fences if present
            const fenceMatch = jsonText.match(/```(?:json)?\s*\n([\s\S]*?)\n\s*```/);
            if (fenceMatch) {
              jsonText = fenceMatch[1].trim();
            }

            // Write to file for Python to parse (avoids shell escaping issues entirely)
            const fs = require('fs');
            fs.writeFileSync('_issue_body.json', jsonText, 'utf8');
            core.setOutput('issue_number', issueNumber);
            core.setOutput('issue_author', issueAuthor);

      - name: Validate submission JSON
        id: validate
        run: |
          if python tools/parse_github_issue.py _issue_body.json > _parsed.json 2> _validation_error.txt; then
            echo "valid=true" >> "$GITHUB_OUTPUT"
          else
            echo "valid=false" >> "$GITHUB_OUTPUT"
            echo "error=$(cat _validation_error.txt)" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment validation error and close
        if: steps.validate.outputs.valid == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const error = fs.readFileSync('_validation_error.txt', 'utf8').trim();
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.extract.outputs.issue_number }},
              body: `❌ **Submission validation failed**\n\n\`\`\`\n${error}\n\`\`\`\n\nPlease fix the JSON and resubmit.`
            });
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.extract.outputs.issue_number }},
              labels: ['invalid']
            });

      - name: Run submission pipeline
        if: steps.validate.outputs.valid == 'true'
        id: pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -e

          # Read parsed fields safely via Python (no shell interpolation of user input)
          # First check if this equation is already promoted (idempotency guard for re-runs
          # and concurrent triggered events). If found, reuse the existing record instead of
          # creating a duplicate submission.
          SUBMISSION_ID=$(python -c "
          import json, subprocess, sys

          d = json.load(open('_parsed.json'))
          name_norm = d['name'].strip().lower()

          # Look for an existing promoted entry with the same name
          try:
              subs = json.loads(open('data/submissions.json', encoding='utf-8').read())
              for e in subs.get('entries', []):
                  if e.get('name', '').strip().lower() == name_norm and e.get('status') == 'promoted':
                      sid = e['submissionId']
                      print(f'found existing promoted: {sid}', file=sys.stderr)
                      print(sid)
                      sys.exit(0)
          except Exception as ex:
              print(f'existing check error: {ex}', file=sys.stderr)

          # Not found — submit as new
          args = [
              sys.executable, 'tools/submit_equation.py',
              '--name', d['name'],
              '--equation', d['equation'],
              '--description', d['description'],
              '--source', d.get('source', 'github-issue'),
              '--submitter', d.get('submitter', 'anonymous'),
              '--units', d.get('units', 'TBD'),
              '--theory', d.get('theory', 'TBD'),
          ]
          for a in d.get('assumptions', []):
              args.extend(['--assumption', a])
          for e in d.get('evidence', []):
              args.extend(['--evidence', e])
          result = subprocess.run(args, capture_output=True, text=True, cwd='.')
          print(result.stdout, file=sys.stderr)
          # Extract submission ID from output
          for line in result.stdout.strip().split('\n'):
              if line.startswith('submitted:'):
                  print(line.split(':', 1)[1].strip())
                  break
          ")

          echo "submission_id=$SUBMISSION_ID" >> "$GITHUB_OUTPUT"
          echo "Submitted/Found: $SUBMISSION_ID"

          # Read current status to decide whether to run the score/promote pipeline
          CURRENT_STATUS=$(python -c "
          import json
          subs = json.loads(open('data/submissions.json', encoding='utf-8').read())
          for e in subs.get('entries', []):
              if e.get('submissionId') == '$SUBMISSION_ID':
                  print(e.get('status', 'pending'))
                  break
          " 2>/dev/null || echo "pending")

          if [ "$CURRENT_STATUS" != "promoted" ]; then
            # Score (with solver verification if hrphasenet is available)
            python tools/score_submission.py --submission-id "$SUBMISSION_ID" --mark-ready-threshold 65 --solver
          else
            echo "Submission already promoted — skipping score/promote steps"
          fi

          # Read score result
          SCORE=$(python -c "
          import json
          subs = json.loads(open('data/submissions.json', encoding='utf-8').read())
          for e in subs.get('entries', []):
              if e.get('submissionId') == '$SUBMISSION_ID':
                  review = e.get('review', {}) or {}
                  print(review.get('score', 0))
                  break
          ")
          STATUS=$(python -c "
          import json
          subs = json.loads(open('data/submissions.json', encoding='utf-8').read())
          for e in subs.get('entries', []):
              if e.get('submissionId') == '$SUBMISSION_ID':
                  print(e.get('status', 'unknown'))
                  break
          ")

          echo "score=$SCORE" >> "$GITHUB_OUTPUT"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "Score: $SCORE, Status: $STATUS"

          DUPLICATE_WARNING=$(python -c "
          import json
          subs = json.loads(open('data/submissions.json', encoding='utf-8').read())
          for e in subs.get('entries', []):
              if e.get('submissionId') == '$SUBMISSION_ID':
                  warnings = e.get('duplicateWarnings', []) or []
                  print(' | '.join(str(x) for x in warnings))
                  break
          ")
          echo "duplicate_warning=$DUPLICATE_WARNING" >> "$GITHUB_OUTPUT"

          # Promote if ready (score >= 65); treat already-promoted as promoted=true
          if [ "$STATUS" = "ready" ]; then
            python tools/promote_submission.py --submission-id "$SUBMISSION_ID" --from-review
            echo "promoted=true" >> "$GITHUB_OUTPUT"

            # Create a dedicated GitHub repo for this equation
            EQUATION_ID=$(python -c "
          import json
          subs = json.loads(open('data/submissions.json', encoding='utf-8').read())
          for e in subs.get('entries', []):
              if e.get('submissionId') == '$SUBMISSION_ID':
                  print((e.get('review') or {}).get('equationId', ''))
                  break
          ")
            if [ -n "$EQUATION_ID" ]; then
              python tools/create_equation_repo.py --equation-id "$EQUATION_ID" || echo "Repo creation skipped (error)"
            fi
          elif [ "$STATUS" = "promoted" ]; then
            echo "promoted=true" >> "$GITHUB_OUTPUT"
          else
            echo "promoted=false" >> "$GITHUB_OUTPUT"
          fi

          # LLM quality score (advisory, does not affect promotion)
          if [ -n "${OPENAI_API_KEY:-}" ]; then
            python tools/llm_score_submission.py --submission-id "$SUBMISSION_ID" || echo "LLM scoring skipped (API error)"
            # Read LLM total for the receipt comment
            LLM_TOTAL=$(python -c "
          import json
          subs = json.loads(open('data/submissions.json', encoding='utf-8').read())
          for e in subs.get('entries', []):
              if e.get('submissionId') == '$SUBMISSION_ID':
                  llm = (e.get('review') or {}).get('llm_scores', {})
                  print(llm.get('llm_total', 'N/A'))
                  break
          " 2>/dev/null || echo "N/A")
            echo "llm_total=$LLM_TOTAL" >> "$GITHUB_OUTPUT"
            BLENDED=$(python -c "
          import json
          subs = json.loads(open('data/submissions.json', encoding='utf-8').read())
          for e in subs.get('entries', []):
              if e.get('submissionId') == '$SUBMISSION_ID':
                  print((e.get('review') or {}).get('blended_score', 'N/A'))
                  break
          " 2>/dev/null || echo "N/A")
            echo "blended=$BLENDED" >> "$GITHUB_OUTPUT"
          else
            echo "LLM scoring skipped (no OPENAI_API_KEY)"
            echo "llm_total=N/A" >> "$GITHUB_OUTPUT"
          fi

          # Read solver verification status
          SOLVER_STATUS=$(python -c "
          import json
          subs = json.loads(open('data/submissions.json', encoding='utf-8').read())
          for e in subs.get('entries', []):
              if e.get('submissionId') == '$SUBMISSION_ID':
                  sv = (e.get('review') or {}).get('solver_verification', {})
                  if sv:
                      p = sv.get('passed_count', 0)
                      t = sv.get('total_count', 0)
                      print(f'{p}/{t} passed' if sv.get('passed') else f'{p}/{t} (FAIL)')
                  else:
                      print('N/A')
                  break
          " 2>/dev/null || echo "N/A")
          echo "solver_status=$SOLVER_STATUS" >> "$GITHUB_OUTPUT"

          # Export certificates before building site so certificates.html is always current
          python tools/export_equation_certificates.py

          # Rebuild leaderboard and site (reads freshly-exported certificates)
          python tools/generate_leaderboard.py
          python tools/build_site.py

      - name: Commit and push changes
        if: steps.validate.outputs.valid == 'true'
        run: |
          git config user.name "TopEquations Bot"
          git config user.email "bot@topequations.local"
          git add -A
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "Pipeline: ${{ steps.pipeline.outputs.submission_id }} (score ${{ steps.pipeline.outputs.score }})"
          git push || (git pull --rebase && git push) || echo "::warning::Push failed after rebase; manual sync may be needed"

      - name: Post receipt comment
        if: steps.validate.outputs.valid == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = ${{ steps.extract.outputs.issue_number }};

            // Guard against duplicate processing: skip if the issue is already labeled 'processed'
            const { data: currentIssue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
            });
            if (currentIssue.labels.some(l => l.name === 'processed')) {
              console.log('Issue already labeled processed — skipping duplicate receipt');
              return;
            }

            const subId = '${{ steps.pipeline.outputs.submission_id }}';
            const score = '${{ steps.pipeline.outputs.score }}';
            const status = '${{ steps.pipeline.outputs.status }}';
            const promoted = '${{ steps.pipeline.outputs.promoted }}' === 'true';
            const llmTotal = '${{ steps.pipeline.outputs.llm_total }}';
            const blended = '${{ steps.pipeline.outputs.blended }}';
            const duplicateWarning = '${{ steps.pipeline.outputs.duplicate_warning }}';
            const solverStatus = '${{ steps.pipeline.outputs.solver_status }}';

            let body = `## Submission Receipt\n\n`;
            body += `| Field | Value |\n|-------|-------|\n`;
            body += `| Submission ID | \`${subId}\` |\n`;
            body += `| Heuristic Score | **${score}** / 100 |\n`;
            body += `| LLM Quality Score | **${llmTotal}** / 100 |\n`;
            body += `| Blended Score | **${blended}** / 100 |\n`;
            body += `| Solver Verification | ${solverStatus} |\n`;
            body += `| Status | ${status} |\n`;
            body += `| Promoted | ${promoted ? '✅ Yes — added to registry' : '⏳ Needs review (score < 65)'} |\n`;
            body += `| Chain publish | 🕐 Pending next local publish cycle |\n\n`;

            if (promoted) {
              body += `Your equation has been added to the [TopEquations registry](https://rdm3dc.github.io/TopEquations/registry.html).\n`;
              body += `Certificate will be published on-chain during the next publish cycle.\n`;
            } else {
              body += `Your equation scored below the auto-promotion threshold (65). `;
              body += `It's queued for manual review by the project maintainer.\n`;
            }

            if (duplicateWarning) {
              body += `\n**Duplicate check:** ${duplicateWarning}\n`;
            }

            body += `\n---\n*Processed by the TopEquations pipeline. Heuristic gate is deterministic; LLM quality score is advisory only.*`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: body
            });

            // Add result labels and close
            const labels = promoted ? ['processed', 'promoted'] : ['processed', 'needs-review'];
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: labels
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              state: 'closed'
            });
