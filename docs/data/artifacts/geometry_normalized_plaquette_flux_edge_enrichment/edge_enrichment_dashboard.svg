  <line x1='92.00' y1='606.00' x2='128.00' y2='606.00' stroke='#b4432a' stroke-width='5.0' /><text x='144.00' y='612.00' font-family='Georgia, Times New Roman, serif' font-size='18' font-weight='700' fill='#173052' text-anchor='start'>Xi_edge &gt; 1</text><text x='268.00' y='612.00' font-family='Georgia, Times New Roman, serif' font-size='18' font-weight='400' fill='#50627d' text-anchor='start'>genuine edge concentration</text><line x1='92.00' y1='640.00' x2='128.00' y2='640.00' stroke='#1d6f86' stroke-width='5.0' /><text x='144.00' y='646.00' font-family='Georgia, Times New Roman, serif' font-size='18' font-weight='700' fill='#173052' text-anchor='start'>Xi_edge = 1</text><text x='268.00' y='646.00' font-family='Georgia, Times New Roman, serif' font-size='18' font-weight='400' fill='#50627d' text-anchor='start'>boundary-area scaling</text><line x1='92.00' y1='674.00' x2='128.00' y2='674.00' stroke='#5d6d7e' stroke-width='5.0' /><text x='144.00' y='680.00' font-family='Georgia, Times New Roman, serif' font-size='18' font-weight='700' fill='#173052' text-anchor='start'>Xi_edge &lt; 1</text><text x='268.00' y='680.00' font-family='Georgia, Times New Roman, serif' font-size='18' font-weight='400' fill='#50627d' text-anchor='start'>flux pushed inward</text>
  <text x='86.00' y='722.00' font-family='Georgia, Times New Roman, serif' font-size='17' font-weight='400' fill='#50627d' text-anchor='start'>For the promoted HAFC-EGATL entry, central-strip runs at sizes 128 and 160 stay close to Xi_edge = 1, supporting stable boundary-area scaling rather than inward collapse.</text>
  <text x='86.00' y='752.00' font-family='Georgia, Times New Roman, serif' font-size='16' font-weight='400' fill='#50627d' text-anchor='start'>Equation: Xi_edge = f_edge^(rho) / (|partial Omega| / N_p), with f_edge^(rho) = sum_(p in partial Omega) |rho_p| / sum_p |rho_p|.</text>
